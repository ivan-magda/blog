name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # --project-name MUST match the Pages project you create in the dashboard.
          # push to main  -> branch=main  -> production deploy
          # pull_request  -> branch=<head> -> preview deploy at a unique URL
          command: pages deploy dist --project-name=ivanmagda-dev --branch=${{ github.head_ref || github.ref_name }} --commit-dirty=true

  indexnow:
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Submit URLs to IndexNow
        run: |
          SITEMAP=$(curl -s "https://ivanmagda.dev/sitemap-index.xml")
          CHILD_URLS=$(echo "$SITEMAP" | grep -oP '(?<=<loc>)[^<]+')

          ALL_URLS=""
          for sm in $CHILD_URLS; do
            URLS=$(curl -s "$sm" | grep -oP '(?<=<loc>)[^<]+')
            ALL_URLS="$ALL_URLS $URLS"
          done

          URL_JSON=$(echo $ALL_URLS | tr ' ' '\n' | jq -R . | jq -s .)
          COUNT=$(echo "$URL_JSON" | jq length)

          BODY=$(jq -n \
            --arg host "ivanmagda.dev" \
            --arg key "0f14d764-3ef3-4a68-b4b4-ae1fb15a8de2" \
            --arg keyLocation "https://ivanmagda.dev/0f14d764-3ef3-4a68-b4b4-ae1fb15a8de2.txt" \
            --argjson urlList "$URL_JSON" \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')

          echo "Submitting $COUNT URLs to IndexNow"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$BODY")
          echo "IndexNow response: HTTP $RESPONSE"
